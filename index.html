<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💕 15.01</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0010;
      height: 100vh;
      overflow: hidden;
      font-family: 'Georgia', serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .particle {
      position: fixed;
      pointer-events: none;
      animation: floatUp linear infinite;
      opacity: 0;
      white-space: nowrap;
      z-index: 1;
    }
    @keyframes floatUp {
      0%   { transform: translateY(105vh); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.9; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
    .star {
      position: fixed;
      border-radius: 50%;
      background: white;
      animation: twinkle ease-in-out infinite;
      z-index: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; } 50% { opacity: 0.9; }
    }
    .main {
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .date {
      font-size: clamp(2rem, 8vw, 4.5rem);
      font-weight: bold;
      color: #fff;
      letter-spacing: 10px;
      animation: glow 2s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100% { text-shadow: 0 0 20px #ff4d9e, 0 0 50px #ff4d9e; }
      50%      { text-shadow: 0 0 50px #ff4d9e, 0 0 100px #ff4d9e; }
    }

    .slideshow {
      position: relative;
      width: min(280px, 70vw);
      height: min(370px, 92vw);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(255,77,158,0.5);
      background: #000;
    }
    .slideshow img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
    }
    .slideshow img.active { opacity: 1; }

    .heart {
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      animation: heartbeat 1s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      14%     { transform: scale(1.35); }
      28%     { transform: scale(1); }
      42%     { transform: scale(1.35); }
    }
    .special {
      font-size: clamp(0.9rem, 2.8vw, 1.3rem);
      color: #ffccee;
      font-style: italic;
      text-shadow: 0 0 12px #ff4d9e;
      animation: pulse 2s ease-in-out infinite;
      max-width: min(300px, 85vw);
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.85; transform: scale(1.04); }
    }
    .love-text {
      font-size: clamp(0.8rem, 2.5vw, 1.1rem);
      color: #ff4d9e;
      font-style: italic;
      text-shadow: 0 0 8px #ff4d9e;
      min-height: 1.6rem;
      transition: opacity 0.5s;
    }
  </style>
</head>

  <div class="heart">💗</div>
  <div class="special">✨ Você é o amor da minha vida ✨</div>
  <div class="love-text" id="loveText">Eu te amo ❤️</div>
</div>
<script>
  const imgs = document.querySelectorAll('#slideshow img');
  let current = 0;
  setInterval(() => {
    imgs[current].classList.remove('active');
    current = (current + 1) % imgs.length;
    imgs[current].classList.add('active');
  }, 3000);

  const frases = [
    "Eu te amo ❤️","I love you 💕","Je t'aime 💖","Te amo 💗",
    "Ti amo 🌸","Ich liebe dich 💝","Seni seviyorum ✨",
    "Mahal kita 💓","Я тебя люблю 🌹","我爱你 💕","أحبك ❤️","Aishiteru 💖",
  ];
  let fi = 0;
  const loveText = document.getElementById('loveText');
  setInterval(() => {
    loveText.style.opacity = 0;
    setTimeout(() => {
      fi = (fi + 1) % frases.length;
      loveText.textContent = frases[fi];
      loveText.style.opacity = 1;
    }, 500);
  }, 2500);

  const cores = ["#ff4d9e","#ff85c0","#ffaadd","#ff1a75","#ffccee","#ff3399","#fff"];
  function criarParticula() {
    const el = document.createElement('div');
    el.classList.add('particle');
    el.textContent = frases[Math.floor(Math.random() * frases.length)];
    el.style.left = Math.random() * 100 + 'vw';
    const cor = cores[Math.floor(Math.random() * cores.length)];
    el.style.color = cor;
    el.style.textShadow = `0 0 6px ${cor}`;
    el.style.fontSize = (Math.random() * 1 + 0.65) + 'rem';
    const dur = Math.random() * 7 + 6;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = (Math.random() * 2) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), (dur + 3) * 1000);
  }
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.classList.add('star');
    const sz = (Math.random() * 2.5 + 0.5) + 'px';
    s.style.width = s.style.height = sz;
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.animationDuration = (Math.random() * 3 + 1) + 's';
    s.style.animationDelay = (Math.random() * 3) + 's';
    document.body.appendChild(s);
  }
  setInterval(criarParticula, 350);
</script>
